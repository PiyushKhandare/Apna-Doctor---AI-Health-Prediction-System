<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BMI Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #e3ffe7, #d9e7ff);
      font-family: 'Segoe UI', sans-serif;
    }
    .form-card {
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      background-color: #fff;
    }
    .section-title {
      font-weight: 600;
      font-size: 1.9rem;
      color: #343a40;
    }
    .back-home {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-weight: 500;
      color: #000;
      text-decoration: none;
    }
    .back-home:hover {
      color: #0d6efd;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card form-card p-4">
          <div class="text-center mb-4">
            <h2 class="section-title">📏 BMI Calculator</h2>
            <p class="text-muted">Enter your height and weight to calculate your BMI</p>
          </div>

          <form method="POST">
            <div class="mb-3">
              <label>Weight (in kg)</label>
              <input type="number" step="0.1" name="weight" class="form-control" required>
            </div>
            <div class="mb-3">
              <label>Height (in cm)</label>
              <input type="number" step="0.1" name="height" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">🧮 Calculate</button>
          </form>

          {% if bmi %}
          <div class="alert alert-info text-center mt-4 fw-semibold fs-5">
            Your BMI is: <strong>{{ bmi }}</strong><br>
            <span class="badge bg-primary mt-2">{{ category }}</span>
          </div>
          {% endif %}

          <a href="/" class="back-home">← Back to Home</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
