<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alzheimer's Detection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #ffecd2, #fcb69f);
      font-family: 'Segoe UI', sans-serif;
    }
    .form-card {
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      background-color: #fff;
    }
    .section-title {
      font-weight: 600;
      font-size: 1.9rem;
      color: #343a40;
    }
    .back-home {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-weight: 500;
      color: #000;
      text-decoration: none;
    }
    .back-home:hover {
      color: #0d6efd;
      text-decoration: underline;
    }
    .img-preview {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card form-card p-4">
          <div class="text-center mb-4">
            <h2 class="section-title">🧠 Alzheimer's Detection</h2>
            <p class="text-muted">Upload brain scan image to detect Alzheimer's condition</p>
          </div>

          <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
              <label>Upload Brain Scan (PNG/JPG)</label>
              <input type="file" name="file" accept="image/*" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-danger w-100">🧠 Detect</button>
          </form>

          {% if image %}
          <div class="text-center mt-4">
            <img src="{{ url_for('static', filename='uploads/' + image) }}" class="img-preview">
            <div class="alert alert-info mt-3"><strong>Prediction:</strong> {{ prediction }}</div>
          </div>
          {% endif %}

          <a href="/" class="back-home">← Back to Home</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
