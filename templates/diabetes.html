<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Diabetes Prediction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #fceabb, #f8b500);
      font-family: 'Segoe UI', sans-serif;
    }
    .form-card {
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      background-color: #fff;
    }
    .section-title {
      font-weight: 600;
      font-size: 1.9rem;
      color: #343a40;
    }
    .result-alert {
      font-size: 1.2rem;
      font-weight: 500;
    }
    .back-home {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-weight: 500;
      color: #000;
      text-decoration: none;
    }
    .back-home:hover {
      color: #0d6efd;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8">

        <div class="card form-card p-4">
          <div class="text-center mb-4">
            <h2 class="section-title">🩺 Diabetes Prediction Tool</h2>
            <p class="text-muted">Enter your details below to check for diabetes risk</p>
          </div>

          <form method="POST">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label>Pregnancies</label>
                <input type="number" name="Pregnancies" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label>Glucose</label>
                <input type="number" name="Glucose" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label>Blood Pressure</label>
                <input type="number" name="BloodPressure" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label>Skin Thickness</label>
                <input type="number" name="SkinThickness" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label>Insulin</label>
                <input type="number" name="Insulin" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label>BMI</label>
                <input type="number" step="0.01" name="BMI" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label>Diabetes Pedigree Function</label>
                <input type="number" step="0.01" name="DiabetesPedigreeFunction" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label>Age</label>
                <input type="number" name="Age" class="form-control" required>
              </div>
            </div>

            <button type="submit" class="btn btn-dark w-100 py-2 mt-2">🔍 Predict</button>
          </form>

          {% if prediction_text %}
          <div class="alert alert-info text-center mt-4 result-alert">
            <strong>Result:</strong> {{ prediction_text }}
          </div>
          {% endif %}

          <!-- Back to Home Link -->
          <a href="/" class="back-home">← Back to Home</a>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
